<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - そなえるくん</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>🛡️ そなえるくん</h1>
        <p>新規ユーザー登録</p>
    </header>

    <main>
        <section>
            <h2>📝 アカウント作成</h2>
            <form th:action="@{/signup}" method="post">
    <input type="hidden" name="hostName" th:value="${hostName}">

    <div class="form-group">
        <label>ユーザー名</label>
        <input type="text" name="username" required placeholder="好きな名前を入力">
    </div>
    <div class="form-group">
        <label>パスワード</label>
        <input type="password" name="password" required placeholder="パスワードを入力">
    </div>
    <button type="submit">✨ 登録を完了する</button>
</form>
            
            <div style="text-align: center; margin-top: 25px;">
                <a th:href="@{/}" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">
                    ← ログイン画面に戻る
                </a>
            </div>
        </section>
    </main>
</body>
</html>
