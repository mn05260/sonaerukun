<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - そなえるくん</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>🛡️ そなえるくん</h1>
        <p>新規ユーザー登録</p>
    </header>

    <main>
      <section>
    <h2>📝 アカウント作成</h2>

    <form th:action="@{/signup}" method="post">
        
        <input type="hidden" name="hostName" th:value="${hostName}">

        <p th:if="${error}" th:text="${error}" 
           style="color: #ef4444; font-size: 0.9rem; text-align: center; margin-bottom: 15px; font-weight: bold;">
        </p>

        <div class="form-group">
            <label>ユーザー名</label>
            <input type="text" name="username" required placeholder="自分だけの名前を入力">
        </div>

        <div class="form-group">
            <label>パスワード <span style="font-size: 0.7rem; color: #64748b;">(8文字以上)</span></label>
            <input type="password" name="password" required minlength="8" placeholder="8文字以上で入力">
        </div>

        <button type="submit">🚀 登録する</button>

    </form> <div style="text-align: center; margin-top: 25px;">
        <a th:href="@{/}" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">
            ← ログイン画面に戻る
        </a>
    </div>
</section>
    </main>
</body>
</html>
