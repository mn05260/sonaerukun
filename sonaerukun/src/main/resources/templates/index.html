<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防災グッズ計算アプリ | ソナエルくん</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
<link rel="stylesheet" th:href="@{/css/style.css}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
    <h1 style="font-size: 1.2rem; margin: 0;">📦 ソナエルくん</h1>
    <div style="font-size: 0.85rem; opacity: 0.9;">
        👤 <span th:text="${UserName}">ゲスト</span>さん
    </div>
</header>

<main style="margin-top: 10px;"> <div id="family-status-area" style="margin-bottom: 15px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;">

        <div onclick="toggleFamilyStatus()" style="padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
            <h3 style="font-size: 0.85rem; color: #64748b; margin: 0;">
                👥 つながっている家族
            </h3>
            <span id="family-arrow" style="font-size: 0.7rem; color: #94a3b8; transition: transform 0.3s;">▼</span>
        </div>

        <div id="family-detail-content" style="display: none; padding: 12px; border-top: 1px solid #f1f5f9;">
            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                <div th:each="member : ${members}" 
                     style="background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: #334155; border: 1px solid #cbd5e1;">
                    <span style="color: #22c55e; margin-right: 4px;">●</span>
                    <span th:text="${member.username}">名前</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-container" style="margin-bottom: 15px;">
        <button id="btn-calc" class="tab-btn active" onclick="switchTab('calc')">備えを計算</button>
        <button id="btn-manage" class="tab-btn" onclick="switchTab('manage')">期限・共有</button>
    </div>

    <div id="calc-content">
        <form action="/calculate" method="post">
            <section>
    <h2>🏠 家族構成の入力</h2>

<div class="form-group">
    <label for="prefecture">📍 お住まいの地域（オプション）</label>
    <p class="small text-muted">地域特有のリスクに合わせたアイテムを追加します。</p>
    <select name="prefecture" id="prefecture" onchange="updateTotalCount()" class="form-control">
        <option value="全国共通" selected>設定なし（全国共通）</option>
        
        <optgroup label="--- 都道府県を選択 ---">
            <option value="北海道">北海道</option>
            <option value="青森県">青森県</option><option value="岩手県">岩手県</option>
            <option value="宮城県">宮城県</option><option value="秋田県">秋田県</option>
            <option value="山形県">山形県</option><option value="福島県">福島県</option>
            <option value="茨城県">茨城県</option><option value="栃木県">栃木県</option>
            <option value="群馬県">群馬県</option><option value="埼玉県">埼玉県</option>
            <option value="千葉県">千葉県</option><option value="東京都">東京都</option>
            <option value="神奈川県">神奈川県</option><option value="新潟県">新潟県</option>
            <option value="富山県">富山県</option><option value="石川県">石川県</option>
            <option value="福井県">福井県</option><option value="山梨県">山梨県</option>
            <option value="長野県">長野県</option><option value="岐阜県">岐阜県</option>
            <option value="静岡県">静岡県</option><option value="愛知県">愛知県</option>
            <option value="三重県">三重県</option><option value="滋賀県">滋賀県</option>
            <option value="京都府">京都府</option><option value="大阪府">大阪府</option>
            <option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option>
            <option value="和歌山県">和歌山県</option><option value="鳥取県">鳥取県</option>
            <option value="島根県">島根県</option><option value="岡山県">岡山県</option>
            <option value="広島県">広島県</option><option value="山口県">山口県</option>
            <option value="徳島県">徳島県</option><option value="香川県">香川県</option>
            <option value="愛媛県">愛媛県</option><option value="高知県">高知県</option>
            <option value="福岡県">福岡県</option><option value="佐賀県">佐賀県</option>
            <option value="長崎県">長崎県</option><option value="熊本県">熊本県</option>
            <option value="大分県">大分県</option><option value="宮崎県">宮崎県</option>
            <option value="鹿児島県">鹿児島県</option><option value="沖縄県">沖縄県</option>
        </optgroup>
    </select>
</div>
   <div style="display: flex; gap: 15px; margin-bottom: 15px;">
    <div class="form-group" style="flex: 1;">
        <label>👨 成人男性</label>
        <input type="number" id="maleCount" name="maleCount" th:value="${param.maleCount}" placeholder="0" min="0" max="100" oninput="limitInput(this); updateTotalCount();">
    </div>
    <div class="form-group" style="flex: 1;">
        <label>👩 成人女性</label>
        <input type="number" id="femaleCount" name="femaleCount" th:value="${param.femaleCount}" placeholder="0" min="0" max="100" oninput="toggleHygieneArea(); limitInput(this); updateTotalCount();">
    </div>
</div>

<div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <div class="form-group" style="flex: 1; min-width: 80px;">
        <label>👦 子供</label>
        <input type="number" id="childCount" name="childCount" th:value="${param.childCount}" placeholder="0" min="0" max="100" oninput="limitInput(this); updateTotalCount();">
    </div>
    <div class="form-group" style="flex: 1; min-width: 80px;">
    <label>👶 乳幼児</label>
    <input type="number" id="infantCount" name="infantCount" th:value="${param.infantCount}" placeholder="0" min="0" max="100" oninput="limitInput(this); updateTotalCount();">
</div>

<div class="form-group" style="flex: 1; min-width: 80px;">
    <label>🧓 高齢者</label>
    <input type="number" id="seniorCount" name="seniorCount" th:value="${param.seniorCount}" placeholder="0" min="0" max="100" oninput="limitInput(this); updateTotalCount();">
</div>

<input type="hidden" id="familyCount" name="familyCount" value="0">
</div>
    <div class="form-group">
        <label>⏳ 備蓄日数</label>
        <select name="days">
            <option value="1" th:selected="${param.days == '1'}">1日分（最短）</option>
            <option value="3" th:selected="${param.days == '3' or param.days == null}">3日分（標準）</option>
            <option value="7" th:selected="${param.days == '7'}">7日分（推奨）</option>
        </select>
    </div>

    <div id="hygiene-area" th:style="${(param.femaleCount != null and param.femaleCount[0] != '0') ? 'display: block;' : 'display: none;'}">
        <label>✨ 生理用品の準備量</label>
        <select name="napkinLevel">
            <option value="low">少なめ</option>
            <option value="standard" selected>標準</option>
            <option value="high">多め</option>
        </select>
    </div>

    <p id="error-message" style="color: #ef4444; font-size: 0.85rem; font-weight: bold; text-align: center; margin-bottom: 10px; display: none;">
        ⚠️ 全ての項目に数字を入力してください
    </p>
    <button type="submit" id="submit-btn" onclick="return validateAll()">計算してリストを作る</button>
</section>
        </form>

        <div th:if="${rankA != null}" class="result-container">
    <div class="rank-tabs">
        <button type="button" class="rank-tab active" onclick="showRank('A', event)">A</button>
        <button type="button" class="rank-tab" onclick="showRank('B', event)">B</button>
        <button type="button" class="rank-tab" onclick="showRank('C', event)">C</button>
    </div>

   <section id="content-A" class="rank-content" style="display: block !important;">
        <h2>🏃 ランクA: 即座に持ち出す</h2>
        <div class="item-grid">
            <div th:each="item : ${#strings.arraySplit(rankA, ',')}" class="grid-item">
                <input type="checkbox"> <span th:text="${item.trim()}" onclick="searchItem(this.innerText)"></span>
            </div>
        </div>
    </section>

    <section id="content-B" class="rank-content" style="display:none;">
        <h2>🏠 ランクB: 自宅で備える</h2>
        <div class="item-grid">
            <div th:each="item : ${#strings.arraySplit(rankB, ',')}" class="grid-item">
                <input type="checkbox"> <span th:text="${item.trim()}" onclick="searchItem(this.innerText)"></span>
            </div>
        </div>
    </section>

    <section id="content-C" class="rank-content" style="display:none;">
        <h2>🔋 ランクC: 日常で備える</h2>
        <div class="item-grid">
            <div th:each="item : ${#strings.arraySplit(rankC, ',')}" class="grid-item">
                <input type="checkbox"> <span th:text="${item.trim()}" onclick="searchItem(this.innerText)"></span>
            </div>
        </div>
    </section>
</div>
</div>
<div id="manage-content" style="display: none;">


       <section>
    <h2>🍞 備蓄品の期限管理</h2>
    <div style="background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="new-item-name" placeholder="アイテム名（例：水）" style="flex: 2; min-width: 150px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 10px;">
            <input type="month" id="new-item-date" style="flex: 1; min-width: 130px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 10px;">
            <button type="button" onclick="addItem()" style="background: #22c55e; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s;">追加</button>
        </div>
    </div>

    <div id="expiry-list-container" class="item-card-grid">
        </div>
</section>
        <section>
            <h2>📍 避難・連絡メモ</h2>
            <div class="form-group">
                <label>🏫 第一避難所</label>
                <input type="text" id="evac-place" placeholder="例：〇〇小学校グラウンド" onchange="saveAllData()">
            </div>
            <div class="form-group">
                <label>🤝 集合ルール</label>
                <textarea id="family-rule" placeholder="例：夕方17時に正門前で待ち合わせ" onchange="saveAllData()" style="min-height: 80px;"></textarea>
            <div class="form-group">
                <label>📞 緊急連絡先</label>
                <input type="tel" id="emergency-tel" placeholder="例：090-xxxx-xxxx（父）" onchange="saveAllData()">
            </div>
                <button type="button" onclick="findShelter()"
            style="width: 100%; margin-bottom: 10px; background: #2d5a27; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span>📍</span> 現在地近くの避難所を検索
    </button>
        </section>
    <div class="sync-section card" style="background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; margin-top: 20px; box-shadow: var(--shadow);">
    <h3 style="margin-top: 0; font-size: 1.15rem; display: flex; align-items: center; gap: 10px; color: var(--primary-color);">
        👪 家族に合言葉を教える
    </h3>

    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 20px;">
        強固な合言葉を発行して、家族のLINEに送るだけで共有が完了します。
    </p>

    <div class="my-keyword-area">
        <label style="font-size: 0.85rem; color: #475569; display: block; margin-bottom: 8px; font-weight: bold;">あなたの家の合言葉</label>

        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <input type="text" id="sync-keyword" th:value="${joinCode}" placeholder="未発行" readonly 
       style="flex: 1; background: #f8fafc; font-family: monospace; font-size: 1.1rem; letter-spacing: 1px; font-weight: bold; border: 2px solid #e2e8f0; text-align: center; border-radius: 12px; padding: 12px;">
            <button type="button" onclick="copyKeyword(this)" style="padding: 0 15px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 12px; cursor: pointer; font-size: 1.2rem;">📋</button>
        </div>

        <button type="button" onclick="shareToLine()" 
            style="width: 100%; background: #06C755; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 15px rgba(6, 199, 85, 0.3); transition: transform 0.2s;">
            <span style="font-size: 1.4rem;">💬</span> LINEで家族に送る
        </button>

        <div style="text-align: center; margin-top: 20px; display: flex; flex-direction: column; gap: 12px;">
            <button type="button" onclick="generateStrongKeyword()" style="background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 10px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer;">
                ✨ 新しい合言葉を発行する
            </button>

            <button type="button" onclick="showSyncQR()" style="background: #f1f5f9; color: #64748b; border: none; padding: 10px; border-radius: 12px; font-size: 0.8rem; cursor: pointer;">
                🖼️ 対面ならQRコードを表示
            </button>
        </div>
    </div>

    <div id="qrcode-area" style="margin-top: 20px; display: none; flex-direction: column; align-items: center; border-top: 1px dashed #e2e8f0; padding-top: 20px;">
        <div id="qrcode"></div>
        <p style="font-size: 0.75rem; color: #ef4444; margin-top: 10px; font-weight: bold;">家族のスマホでこのQRをスキャン！</p>
    </div>
</div>

<section style="margin-top: 20px; padding: 20px;">
    <button type="button" class="btn-primary-lg" onclick="startCamera()" 
        style="width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
        📷 家族のQRをスキャンして参加
    </button>
    <div id="camera-section" style="display: none; margin-top: 15px;">
        <video id="video" style="width: 100%; border-radius: 12px;"></video>
        <button type="button" class="sync-btn" style="background: #ef4444; width: 100%;" onclick="stopCamera()">閉じる</button>
    </div>
<section style="margin-top: 20px; padding: 20px;">
        <div style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px; text-align: center;">
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px;">
                🚪 ログアウトしてアプリを閉じる
            </a>
        </div>
    </section>
</main>

<script th:inline="javascript">
    const sessionHostName = /*[[${session.hostName}]]*/ '';
    const currentUserName = /*[[${UserName}]]*/ '';

    // ページが読み込まれたら自動実行
    window.addEventListener('load', function() {
        const syncInput = document.getElementById('sync-keyword');

        // 1. もしJava側にホスト名（合言葉）があるなら
        if (sessionHostName && sessionHostName !== '') {
            // 入力欄に自動セット
            if (syncInput) syncInput.value = sessionHostName;
            if (typeof startSync === 'function') {
                console.log("家族グループ「" + sessionHostName + "」に自動接続します...");
                startSync(); 
            }
        }
    });
</script>
<script th:src="@{/javascript/app.js}"></script>
</body>
</html>
