<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン - そなえるくん</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>🛡️ そなえるくん</h1>
        <p>おかえりなさい！備えを確認しましょう</p>
    </header>

    <main>
        <section>
            <h2>🔑 ログイン</h2>
            <p th:if="${error}" style="color: #ef4444; font-size: 0.9rem; text-align: center; margin-bottom: 15px; font-weight: bold;">
        ⚠️ ユーザー名かパスワードが違います
    </p>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>ユーザー名</label>
                    <input type="text" name="username" required placeholder="登録した名前を入力">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" name="password" required placeholder="パスワードを入力">
                </div>
                <button type="submit">🚀 ログインする</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px;">
                <p>アカウントがない方は <a th:href="@{/signup}" style="color: var(--primary-color); font-weight: bold;">新規登録へ</a></p>
            </div>
        </section>
    </main>
</body>
</html>
